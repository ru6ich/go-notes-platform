apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: reporter-reports
  namespace: go-notes-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporter
  namespace: go-notes-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reporter
  template:
    metadata:
      labels:
        app: reporter
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do echo "waiting for postgres"; sleep 2; done
        - name: wait-for-nginx
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z nginx 80; do echo "waiting for nginx"; sleep 2; done
      containers:
        - name: reporter
          image: ghcr.io/ru6ich/go-notes-reporter:50f75cf6ebec8ed6244ab90e67176ec9b84f0efc
          imagePullPolicy: IfNotPresent
          env:
            - name: TARGET_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: TARGET_URL
            - name: CHECK_INTERVAL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CHECK_INTERVAL_SECONDS
            - name: REPORT_EVERY_N_CHECKS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REPORT_EVERY_N_CHECKS
            - name: RUN_MODE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: RUN_MODE
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: reports
              mountPath: /app/reports
      volumes:
        - name: reports
          persistentVolumeClaim:
            claimName: reporter-reports
