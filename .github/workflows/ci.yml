name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-check:
    name: Go API check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
          cache-dependency-path: api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build API binary
        run: go build -v ./cmd/api

  reporter-check:
    name: Reporter check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reporter
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: reporter/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate reporter syntax
        run: python -m py_compile reporter.py

  docker-build:
    name: Docker image build check
    runs-on: ubuntu-latest
    needs:
      - api-check
      - reporter-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build API image
        run: docker build -t go-notes-api:ci -f Dockerfile.api .

      - name: Build reporter image
        run: docker build -t go-notes-reporter:ci -f Dockerfile.reporter .
