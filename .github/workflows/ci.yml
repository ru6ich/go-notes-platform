name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  api-check:
    name: Go API check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.5"
          cache-dependency-path: api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build API binary
        run: go build -v ./cmd/api

  reporter-check:
    name: Reporter check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reporter
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: reporter/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate reporter syntax
        run: python -m py_compile reporter.py

  docker-build:
    name: Docker image build check
    runs-on: ubuntu-latest
    needs:
      - api-check
      - reporter-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build API image
        run: docker build -t go-notes-api:ci -f Dockerfile.api .

      - name: Build reporter image
        run: docker build -t go-notes-reporter:ci -f Dockerfile.reporter .

  publish-images:
    name: Publish images to GHCR
    runs-on: ubuntu-latest
    needs:
      - api-check
      - reporter-check
      - docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: |
            ghcr.io/ru6ich/go-notes-api:latest
            ghcr.io/ru6ich/go-notes-api:${{ github.sha }}

      - name: Build and push reporter image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.reporter
          push: true
          tags: |
            ghcr.io/ru6ich/go-notes-reporter:latest
            ghcr.io/ru6ich/go-notes-reporter:${{ github.sha }}
